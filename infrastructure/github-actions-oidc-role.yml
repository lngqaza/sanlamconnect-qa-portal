AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC deployment role for the QA Portal repository.

Parameters:
  GitHubOwner:
    Type: String
    Default: lngqaza
  GitHubRepository:
    Type: String
    Default: sanlamconnect-qa-portal
  RoleName:
    Type: String
    Default: github-actions-deploy
  ExistingOidcProviderArn:
    Type: String
    Default: ''
    Description: Leave blank to create the GitHub OIDC provider, or pass the existing provider ARN if the account already has one.

Conditions:
  CreateOidcProvider: !Equals [!Ref ExistingOidcProviderArn, '']

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub 'repo:${GitHubOwner}/${GitHubRepository}:ref:refs/heads/main'
                  - !Sub 'repo:${GitHubOwner}/${GitHubRepository}:environment:dev'
                  - !Sub 'repo:${GitHubOwner}/${GitHubRepository}:environment:staging'
                  - !Sub 'repo:${GitHubOwner}/${GitHubRepository}:environment:production'
      Policies:
        - PolicyName: QAPortalDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Sid: ServiceDeployment
                Effect: Allow
                Action:
                  - apigateway:*
                  - cloudfront:CreateCloudFrontOriginAccessIdentity
                  - cloudfront:CreateDistribution
                  - cloudfront:CreateInvalidation
                  - cloudfront:DeleteCloudFrontOriginAccessIdentity
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetCloudFrontOriginAccessIdentity
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:ListDistributions
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:UpdateCloudFrontOriginAccessIdentity
                  - cloudfront:UpdateDistribution
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:ListTagsOfResource
                  - dynamodb:TagResource
                  - dynamodb:UpdateTable
                  - dynamodb:UpdateTimeToLive
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:ListTagsLogGroup
                  - logs:PutRetentionPolicy
                  - logs:TagLogGroup
                  - logs:UntagLogGroup
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:DeleteObject
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutBucketWebsite
                  - s3:PutObject
                Resource: '*'
              - Sid: ManageQAPortalIam
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                Resource: '*'

Outputs:
  RoleArn:
    Description: Role ARN to use as AWS_ROLE_ARN in the GitHub Actions workflow.
    Value: !GetAtt GitHubActionsDeployRole.Arn
