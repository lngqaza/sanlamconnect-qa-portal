AWSTemplateFormatVersion: '2010-09-09'
Description: 'QA Portal Infrastructure - API Gateway, Lambda, DynamoDB, S3, CloudFront - Monitors Dynatrace and validates Performance/Monitoring subsystem'

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'staging', 'production']

Resources:
  # ==================== S3 BUCKETS ====================

  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sanlamconnect-qa-portal-${AWS::AccountId}-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      Tags:
        - Key: Application
          Value: QA-Portal
        - Key: Purpose
          Value: Dynatrace-Monitoring-Validation

  # ==================== CLOUDFRONT DISTRIBUTION ====================

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: QA Portal OAI

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOAI}"
              },
              "Action": "s3:GetObject",
              "Resource": "${DashboardBucket.Arn}/*"
            }
          ]
        }

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - DomainName: !GetAtt DashboardBucket.DomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
        CacheBehaviors:
          - PathPattern: 'reports/*'
            AllowedMethods: [GET, HEAD]
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: https-only

  # ==================== DYNAMODB TABLES ====================

  TestRunsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'qa-portal-test-runs-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: run_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: run_id
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Application
          Value: QA-Portal

  TestReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'qa-portal-test-reports-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: report_id
          AttributeType: S
        - AttributeName: run_id
          AttributeType: S
      KeySchema:
        - AttributeName: report_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: run_id-index
          KeySchema:
            - AttributeName: run_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Application
          Value: QA-Portal

  # ==================== CLOUDWATCH LOGS ====================

  TestRunsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/qa-portal/test-runs/${Environment}'
      RetentionInDays: 30

  # ==================== IAM ROLES ====================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:PutItem'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:Scan'
                  - 'dynamodb:Query'
                Resource:
                  - !GetAtt TestRunsTable.Arn
                  - !GetAtt TestReportsTable.Arn
                  - !Sub '${TestReportsTable.Arn}/index/*'
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                  - 'logs:GetLogEvents'
                  - 'logs:FilterLogEvents'
                Resource:
                  - !GetAtt TestRunsLogGroup.Arn
                  - !Sub '${TestRunsLogGroup.Arn}:*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                Resource: !Sub '${DashboardBucket.Arn}/*'

  # ==================== LAMBDA FUNCTIONS ====================

  TestExecutorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'qa-portal-test-executor-${Environment}'
      Runtime: python3.11
      Handler: lambda_handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          TEST_RUNS_TABLE: !Sub 'qa-portal-test-runs-${Environment}'
          LOG_GROUP: !Sub '/qa-portal/test-runs/${Environment}'
          S3_BUCKET: !Sub 'sanlamconnect-qa-portal-${AWS::AccountId}-${Environment}'
      Code:
        ZipFile: |
          def handler(event, context):
              return {'statusCode': 200, 'body': 'Test Executor'}

  TestStatusFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'qa-portal-test-status-${Environment}'
      Runtime: python3.11
      Handler: api_functions.test_status_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          TEST_RUNS_TABLE: !Sub 'qa-portal-test-runs-${Environment}'
      Code:
        ZipFile: |
          def test_status_handler(event, context):
              return {'statusCode': 200, 'body': 'Status'}

  TestLogsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'qa-portal-test-logs-${Environment}'
      Runtime: python3.11
      Handler: api_functions.test_logs_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          LOG_GROUP: !Sub '/qa-portal/test-runs/${Environment}'
      Code:
        ZipFile: |
          def test_logs_handler(event, context):
              return {'statusCode': 200, 'body': 'Logs'}

  TestHistoryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'qa-portal-test-history-${Environment}'
      Runtime: python3.11
      Handler: api_functions.test_history_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          TEST_RUNS_TABLE: !Sub 'qa-portal-test-runs-${Environment}'
      Code:
        ZipFile: |
          def test_history_handler(event, context):
              return {'statusCode': 200, 'body': 'History'}

  ReportGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'qa-portal-report-generator-${Environment}'
      Runtime: python3.11
      Handler: api_functions.report_generator_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          TEST_RUNS_TABLE: !Sub 'qa-portal-test-runs-${Environment}'
          TEST_REPORTS_TABLE: !Sub 'qa-portal-test-reports-${Environment}'
          S3_BUCKET: !Sub 'sanlamconnect-qa-portal-${AWS::AccountId}-${Environment}'
      Code:
        ZipFile: |
          def report_generator_handler(event, context):
              return {'statusCode': 200, 'body': 'Report'}

  # ==================== API GATEWAY ====================

  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'qa-portal-api-${Environment}'
      Description: QA Portal REST API for Dynatrace Monitoring Validation
      EndpointConfiguration:
        Types:
          - REGIONAL

  TestResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: test

  TestExecuteResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref TestResource
      PathPart: execute

  TestHistoryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref TestResource
      PathPart: history

  TestRunResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref TestResource
      PathPart: '{run_id}'

  TestRunStatusResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref TestRunResource
      PathPart: status

  TestRunLogsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref TestRunResource
      PathPart: logs

  ReportResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: report

  ReportGenerateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ReportResource
      PathPart: generate

  TestExecuteMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestExecuteResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestExecutorFunction.Arn}/invocations'

  TestHistoryMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestHistoryResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestHistoryFunction.Arn}/invocations'

  TestStatusMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestRunStatusResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.path.run_id: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestStatusFunction.Arn}/invocations'

  TestLogsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestRunLogsResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.path.run_id: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestLogsFunction.Arn}/invocations'

  ReportGenerateMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ReportGenerateResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReportGeneratorFunction.Arn}/invocations'

  TestExecuteOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestExecuteResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 204}'
        IntegrationResponses:
          - StatusCode: 204
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 204
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  TestHistoryOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestHistoryResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 204}'
        IntegrationResponses:
          - StatusCode: 204
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 204
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  TestStatusOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestRunStatusResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 204}'
        IntegrationResponses:
          - StatusCode: 204
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 204
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  TestLogsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TestRunLogsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 204}'
        IntegrationResponses:
          - StatusCode: 204
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 204
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ReportGenerateOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ReportGenerateResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 204}'
        IntegrationResponses:
          - StatusCode: 204
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 204
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - TestExecuteMethod
      - TestHistoryMethod
      - TestStatusMethod
      - TestLogsMethod
      - ReportGenerateMethod
      - TestExecuteOptionsMethod
      - TestHistoryOptionsMethod
      - TestStatusOptionsMethod
      - TestLogsOptionsMethod
      - ReportGenerateOptionsMethod
    Properties:
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref Environment
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment

  # ==================== LAMBDA PERMISSIONS ====================

  TestExecutorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TestExecutorFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/POST/test/execute'

  TestStatusInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TestStatusFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/GET/test/*/status'

  TestLogsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TestLogsFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/GET/test/*/logs'

  TestHistoryInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TestHistoryFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/GET/test/history'

  ReportGeneratorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReportGeneratorFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/POST/report/generate'

Outputs:
  DashboardUrl:
    Description: QA Portal Dashboard URL
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub 'QAPortalDashboardUrl-${Environment}'

  ApiGatewayUrl:
    Description: API Gateway Base URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub 'QAPortalApiUrl-${Environment}'

  S3BucketName:
    Description: S3 Bucket for Dashboard and Reports
    Value: !Ref DashboardBucket
    Export:
      Name: !Sub 'QAPortalS3Bucket-${Environment}'

  TestRunsTableName:
    Description: DynamoDB TestRuns Table
    Value: !Ref TestRunsTable
    Export:
      Name: !Sub 'QAPortalTestRunsTable-${Environment}'

  CloudWatchLogGroupName:
    Description: CloudWatch Log Group for Test Runs
    Value: !Ref TestRunsLogGroup
    Export:
      Name: !Sub 'QAPortalLogGroup-${Environment}'
