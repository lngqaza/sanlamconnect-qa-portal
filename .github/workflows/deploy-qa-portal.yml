name: Deploy QA Portal

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

env:
  AWS_REGION: eu-west-1
  ACCOUNT_ID: 684756697968
  AWS_ROLE_ARN: arn:aws:iam::684756697968:role/github-actions-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # ==================== CHECKOUT ====================
      - name: Checkout code
        uses: actions/checkout@v3

      # ==================== AWS CREDENTIALS ====================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ==================== BUILD FRONTEND ====================
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build React dashboard
        run: |
          cd frontend
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.API_BASE_URL }}
          REACT_APP_ENVIRONMENT: ${{ github.event.inputs.environment }}

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://sanlamconnect-qa-portal-${{ env.ACCOUNT_ID }}-${{ github.event.inputs.environment }}/ \
            --delete \
            --cache-control "max-age=3600"

      # ==================== PACKAGE LAMBDA FUNCTIONS ====================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt -t package/

      - name: Package Lambda functions
        run: |
          cd backend
          zip -r lambda-package.zip . -x "*.git*" "package.json" "*.md"
          mv lambda-package.zip ../infrastructure/

      # ==================== DEPLOY CLOUDFORMATION ====================
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/qa-portal-infrastructure.yml \
            --stack-name sanlamconnect-qa-portal-${{ github.event.inputs.environment }} \
            --parameter-overrides Environment=${{ github.event.inputs.environment }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --region ${{ env.AWS_REGION }}

      # ==================== INVALIDATE CLOUDFRONT ====================
      - name: Get CloudFront Distribution ID
        id: get-distribution-id
        run: |
          DIST_ID=$(aws cloudformation describe-stack-resources \
            --stack-name sanlamconnect-qa-portal-${{ github.event.inputs.environment }} \
            --logical-resource-id CloudFrontDistribution \
            --query 'StackResources[0].PhysicalResourceId' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront cache
        if: steps.get-distribution-id.outputs.distribution_id != 'null'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.get-distribution-id.outputs.distribution_id }} \
            --paths "/*"

      # ==================== POST-DEPLOYMENT ====================
      - name: Get deployment outputs
        id: outputs
        run: |
          DASHBOARD_URL=$(aws cloudformation describe-stacks \
            --stack-name sanlamconnect-qa-portal-${{ github.event.inputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`DashboardUrl`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name sanlamconnect-qa-portal-${{ github.event.inputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiGatewayUrl`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "dashboard_url=$DASHBOARD_URL" >> $GITHUB_OUTPUT
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Post deployment summary
        run: |
          echo "## QA Portal Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dashboard URL:** https://${{ steps.outputs.outputs.dashboard_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** ${{ steps.outputs.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack notification
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "QA Portal deployed to ${{ github.event.inputs.environment }} ✅",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*QA Portal Deployment*\n*Status:* ✅ Success\n*Environment:* ${{ github.event.inputs.environment }}\n*Dashboard:* https://${{ steps.outputs.outputs.dashboard_url }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Handle deployment failure
        if: failure()
        run: |
          echo "## Deployment Failed ❌" >> $GITHUB_STEP_SUMMARY
          echo "Check logs above for details" >> $GITHUB_STEP_SUMMARY
